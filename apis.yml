aid: google-cloud-kubernetes-engine
name: Google Cloud Kubernetes Engine
description: >-
  Google Kubernetes Engine (GKE) provides a managed environment for deploying,
  managing, and scaling containerized applications using Google infrastructure.
  GKE runs on Kubernetes, providing automated cluster management, auto-scaling,
  auto-repair, and integrated logging and monitoring for container workloads.
